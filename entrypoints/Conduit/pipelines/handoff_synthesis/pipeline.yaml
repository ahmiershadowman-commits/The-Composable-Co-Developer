id: handoff_synthesis
family: Conduit
kind: end_to_end_pipeline
frame_alias: Distill
status: core
purpose: >
  Compress grounded work into a transition-ready artifact that preserves load-bearing
  structure, unresolveds, provenance, and next safe moves without flattening critical nuance.

entry_conditions:
  - transition_or_handoff_artifact_is_primary_deliverable
  - source_work_is_grounded_enough_to_compress
  - receiving_agent_or_human_needs_operational_continuity


shared_authorities:
  trace: runtime/trace
  lever: runtime/lever
  residue: runtime/residue


phase_order:
  - identify_handoff_target_and_scope
  - gather_grounded_source_material
  - separate_core_structure_from_background
  - compress_with_residue_preservation
  - expose_unresolveds_and_risks
  - add_provenance_and_next_steps
  - finalize_or_reroute

phase_contracts:
  identify_handoff_target_and_scope:
    goal: State who the handoff is for and what they need to continue safely.
    outputs:
      - handoff_scope_note
  gather_grounded_source_material:
    goal: Gather the work products and context to compress.
    outputs:
      - handoff_source_packet
  separate_core_structure_from_background:
    goal: Separate essential structure from supporting detail.
    outputs:
      - core_structure_map
  compress_with_residue_preservation:
    goal: Produce a condensed but load-bearing summary.
    outputs:
      - handoff_document
  expose_unresolveds_and_risks:
    goal: Make risks, unresolveds, and live tensions explicit.
    outputs:
      - unresolveds_and_risks
  add_provenance_and_next_steps:
    goal: Add provenance and next-safe actions.
    outputs:
      - provenance_summary
      - next_safe_steps
  finalize_or_reroute:
    goal: Exit with a usable handoff packet or reroute if compression would be dishonest.
    outputs:
      - route_recommendation

smallest_sufficient_interventions:
  motifs:
    - unfinished-proof
    - returning-expedition
  primitives:
    - separate
    - weave
    - trim
  operators:
    - distill
    - clarify
  evaluators:
    - support_evaluator
    - artifact_shape_evaluator

pivot_conditions:
  source_material_conflicted_or_uncertain:
    action: reroute
    target: family:Forensics
  explanation_or_evidence_gaps_block_honest_compression:
    action: reroute
    target: family:Inquiry
  handoff_is_actually_unfinished_build_work:
    action: reroute
    target: family:Forge
  compression_risks_erasing_load_bearing_uncertainty:
    action: invoke_evaluator
    target: evaluator:artifact_shape_evaluator

exit_conditions:
  - handoff_document_present
  - unresolveds_and_risks_present
  - provenance_summary_present
  - next_safe_steps_present

artifacts:
  primary:
    - handoff_document.md
    - next_safe_steps.yaml
    - route_recommendation.yaml
  supporting:
    - handoff_scope_note.yaml
    - handoff_source_packet.yaml
    - core_structure_map.yaml
    - unresolveds_and_risks.yaml
    - provenance_summary.yaml
