id: documentation
family: Conduit
kind: end_to_end_pipeline
frame_alias: Clarify
status: core
purpose: >
  Produce or revise documentation that is grounded in trusted sources, structured
  for use, and explicit about scope, assumptions, limitations, and next-action relevance.

entry_conditions:
  - primary_deliverable_is_documentation_or_reference_material
  - support_state_is_grounded_enough_or_retrievable
  - audience_and_use_case_are_explicit_or_can_be_bounded


shared_authorities:
  trace: runtime/trace
  lever: runtime/lever
  residue: runtime/residue


phase_order:
  - define_audience_and_scope
  - gather_grounded_source_material
  - design_information_structure
  - draft
  - precision_and_support_pass
  - metadata_and_linking_pass
  - finalize_or_reroute

phase_contracts:
  define_audience_and_scope:
    goal: Fix audience, use case, and scope before expansion.
    outputs:
      - audience_scope_note
  gather_grounded_source_material:
    goal: Pull only trusted source material needed for the documentation.
    outputs:
      - source_packet
  design_information_structure:
    goal: Create the structure the reader will navigate.
    outputs:
      - structure_outline
  draft:
    goal: Produce the documentation draft.
    outputs:
      - draft_document
  precision_and_support_pass:
    goal: Improve accuracy, support calibration, and practical usability.
    outputs:
      - support_note
  metadata_and_linking_pass:
    goal: Update links, metadata, and indices.
    outputs:
      - metadata_update_record
  finalize_or_reroute:
    goal: Exit with a usable document or route to a better family.
    outputs:
      - route_recommendation

smallest_sufficient_interventions:
  motifs:
    - returning-expedition
    - unfinished-proof
  primitives:
    - separate
    - weave
    - trim
  operators:
    - clarify
    - distill
  evaluators:
    - support_evaluator
    - trust_evaluator

pivot_conditions:
  documentation_sources_disagree_with_observed_state:
    action: reroute
    target: pipeline:Forensics/documentation_audit
  claim_support_missing_or_explanation_needed:
    action: reroute
    target: family:Inquiry
  implementation_gap_must_be_fixed:
    action: reroute
    target: family:Forge
  grounded_material_ready_for_transfer_compression:
    action: sibling_shift
    target: pipeline:Conduit/handoff_synthesis

exit_conditions:
  - draft_document_present
  - support_note_present
  - metadata_update_record_present
  - route_recommendation_present

artifacts:
  primary:
    - structured_document.md
    - route_recommendation.yaml
  supporting:
    - audience_scope_note.yaml
    - source_packet.yaml
    - structure_outline.yaml
    - support_note.yaml
    - metadata_update_record.yaml
